  function getShareDisplayText(trip, exp) {
    if (exp.expenseType === 'split') {
      var parts = [];
      trip.families.forEach(function(f) {
        var famAmount = exp.familyShares && exp.familyShares[f.id] ? exp.familyShares[f.id] : 0;
        if (famAmount > 0) {
          var adultCount = 0, childCount = 0;
          f.members.forEach(function(m) { if (exp.adultMemberIds && exp.adultMemberIds.indexOf(m.id) !== -1) adultCount++; if (exp.childMemberIds && exp.childMemberIds.indexOf(m.id) !== -1) childCount++; });
          var countStr = ''; if (adultCount > 0 && childCount > 0) countStr = adultCount + '大' + childCount + '小'; else if (adultCount > 0) countStr = adultCount + '大'; else if (childCount > 0) countStr = childCount + '小';
          parts.push(f.name + '(' + countStr + ') ¥' + famAmount.toFixed(2));
        }
      }); return parts.join('、');
    } else {
      var familyStats = {}; trip.families.forEach(function(f) { familyStats[f.id] = { name: f.name, adultCount: 0, childCount: 0, members: [] }; });
      (exp.sharedMemberIds || []).forEach(function(mid) { for (var i = 0; i < trip.families.length; i++) { var m = trip.families[i].members.find(function(x) { return x.id === mid; }); if (m) { familyStats[trip.families[i].id].members.push(m.name); if (m.type === 'adult') familyStats[trip.families[i].id].adultCount++; else familyStats[trip.families[i].id].childCount++; break; } } });
      var parts = []; Object.values(familyStats).forEach(function(fs) { if (fs.members.length > 0) { var countStr = ''; if (fs.adultCount > 0 && fs.childCount > 0) countStr = fs.adultCount + '大' + fs.childCount + '小'; else if (fs.adultCount > 0) countStr = fs.adultCount + '大'; else if (fs.childCount > 0) countStr = fs.childCount + '小'; parts.push(fs.members.join('、') + '(' + countStr + ')'); } });
      return parts.join('；');
    }
  }

    var summaryData = [['家庭名称','已支付金额','应分摊金额','差额','状态']]; Object.values(fb).forEach(function(b){var d=b.paid-b.shouldPay;summaryData.push([b.name,b.paid.toFixed(2),b.shouldPay.toFixed(2),Math.abs(d).toFixed(2),d>=0?'应收':'应付']);});

  window.toggleExpenseType = function(prefix) {
    var unified = document.getElementById('unifiedSection_' + prefix);

    else { unified.style.display = 'none'; split.style.display = 'block'; if (prefix === 'new') updateSplitTotal_new(); else if (prefix === 'edit') updateSplitTotal_edit(); }
  };

  window.updateSplitTotal_new = function() {
    var ap = parseFloat(document.getElementById('adultPrice_new').value) || 0;
    var cp = parseFloat(document.getElementById('childPrice_new').value) || 0;
    var ac = document.querySelectorAll('#adultCheckboxList_new input:checked').length;
    var cc = document.querySelectorAll('#childCheckboxList_new input:checked').length;
    var as = ap * ac, cs = cp * cc;
    var el = function(id) { return document.getElementById(id); };
    if (el('adultSelectedCount_new')) el('adultSelectedCount_new').textContent = ac;
    if (el('childSelectedCount_new')) el('childSelectedCount_new').textContent = cc;
    if (el('adultSubtotal_new')) el('adultSubtotal_new').textContent = '¥' + as.toFixed(2);
    if (el('childSubtotal_new')) el('childSubtotal_new').textContent = '¥' + cs.toFixed(2);
    if (el('splitTotal_new')) el('splitTotal_new').textContent = '¥' + (as + cs).toFixed(2);

  function calculateFamilyShares(trip, adultMemberIds, childMemberIds, adultPrice, childPrice) {
    var familyShares = {};
    trip.families.forEach(function(f) { familyShares[f.id] = 0; });
    trip.families.forEach(function(f) {
      var ft = 0;
      f.members.forEach(function(m) { if (adultMemberIds.indexOf(m.id) !== -1) ft += adultPrice; if (childMemberIds.indexOf(m.id) !== -1) ft += childPrice; });
      familyShares[f.id] = ft;
    });
    return familyShares;
  }

  window.addExpense = function() {
    var trip = getTrip(); if (!trip) return;
    var loc = document.getElementById('expLocation').value.trim();
    var expenseType = document.getElementById('expenseType').value;
    var desc = document.getElementById('expDesc').value.trim();
    var payer = document.getElementById('expPayer').value;
    var dt = document.getElementById('expDateTime').value;
    if (!desc) return alert('请输入描述'); if (!dt) return alert('请选择时间');
    var amount = 0, adultPrice = 0, childPrice = 0, adultMemberIds = [], childMemberIds = [], sharedMemberIds = [], sharedFamilyIds = [], familyShares = {};
    if (expenseType === 'unified') {
      amount = parseFloat(document.getElementById('expAmount').value);
      if (isNaN(amount) || amount <= 0) return alert('请输入有效金额');
      var cbs = document.querySelectorAll('#personCheckboxList_new input:checked');
      if (cbs.length === 0) return alert('请选择均摊人员');
      sharedMemberIds = Array.from(cbs).map(function(c) { return c.value; });
      trip.families.forEach(function(f) { familyShares[f.id] = 0; });
      var perPerson = amount / sharedMemberIds.length;
      sharedMemberIds.forEach(function(mid) { var fid = mid.split('_')[1]; if (familyShares[fid] !== undefined) familyShares[fid] += perPerson; });
      sharedFamilyIds = Object.keys(familyShares).filter(function(fid) { return familyShares[fid] > 0; });
    } else {
      adultPrice = parseFloat(document.getElementById('adultPrice_new').value) || 0;
      childPrice = parseFloat(document.getElementById('childPrice_new').value) || 0;
      adultMemberIds = Array.from(document.querySelectorAll('#adultCheckboxList_new input:checked')).map(function(cb) { return cb.value; });
      childMemberIds = Array.from(document.querySelectorAll('#childCheckboxList_new input:checked')).map(function(cb) { return cb.value; });
      if (!adultMemberIds.length && !childMemberIds.length) return alert('请选择参与的人员');
      amount = adultPrice * adultMemberIds.length + childPrice * childMemberIds.length;
      if (amount <= 0) return alert('请输入有效单价');
      familyShares = calculateFamilyShares(trip, adultMemberIds, childMemberIds, adultPrice, childPrice);
      sharedFamilyIds = Object.keys(familyShares).filter(function(fid) { return familyShares[fid] > 0; });
      trip.families.forEach(function(f) { if (familyShares[f.id] > 0) { f.members.forEach(function(m) { sharedMemberIds.push(m.id); }); } });
    }
    trip.expenses.push({ id: 'e' + Date.now(), location: loc, description: desc, amount: amount, expenseType: expenseType, adultPrice: adultPrice, childPrice: childPrice, adultMemberIds: adultMemberIds, childMemberIds: childMemberIds, paidByFamilyId: payer, sharedMemberIds: sharedMemberIds, sharedFamilyIds: sharedFamilyIds, familyShares: familyShares, dateTime: new Date(dt).toISOString() });
    save(); renderExpense();
  };

    h += '<div id="splitSection_edit" style="display:' + displaySplit + ';">';
    h += '<div class="split-fee-card"><div class="fee-header" style="justify-content:space-between;"><span>👤 按大人收费</span><div class="select-btns"><button class="btn btn-outline" onclick="selectAll(\'adultCheckboxList_edit\',\'updateSplitTotal_edit\')">全选</button><button class="btn btn-outline" onclick="deselectAll(\'adultCheckboxList_edit\',\'updateSplitTotal_edit\')">全不选</button></div></div><div class="input-group"><label>大人单价</label><input class="input-field" type="number" id="adultPrice_edit" value="' + (exp.adultPrice || 0) + '" step="0.01" oninput="updateSplitTotal_edit()"></div><div class="checkbox-list" id="adultCheckboxList_edit">' + allMembers.map(function(m) { var checked = exp.adultMemberIds && exp.adultMemberIds.includes(m.id) ? ' checked' : ''; return '<label class="person-checkbox"><input type="checkbox" value="' + m.id + '"' + checked + ' onchange="updateSplitTotal_edit()"> ' + esc(m.familyName) + '·' + esc(m.name) + ' (' + (m.type === 'adult' ? '大人' : '小孩') + ')</label>'; }).join('') + '</div><div class="subtotal-text">已选 <strong id="adultSelectedCount_edit">' + (exp.adultMemberIds ? exp.adultMemberIds.length : 0) + '</strong> 人，小计：<strong id="adultSubtotal_edit">¥' + ((exp.adultPrice || 0) * (exp.adultMemberIds ? exp.adultMemberIds.length : 0)).toFixed(2) + '</strong></div></div>';
    h += '<div class="split-fee-card"><div class="fee-header" style="justify-content:space-between;"><span>👶 按小孩收费</span><div class="select-btns"><button class="btn btn-outline" onclick="selectAll(\'childCheckboxList_edit\',\'updateSplitTotal_edit\')">全选</button><button class="btn btn-outline" onclick="deselectAll(\'childCheckboxList_edit\',\'updateSplitTotal_edit\')">全不选</button></div></div><div class="input-group"><label>小孩单价</label><input class="input-field" type="number" id="childPrice_edit" value="' + (exp.childPrice || 0) + '" step="0.01" oninput="updateSplitTotal_edit()"></div><div class="checkbox-list" id="childCheckboxList_edit">' + childMembers.map(function(m) { var checked = exp.childMemberIds && exp.childMemberIds.includes(m.id) ? ' checked' : ''; return '<label class="person-checkbox"><input type="checkbox" value="' + m.id + '"' + checked + ' onchange="updateSplitTotal_edit()"> ' + esc(m.familyName) + '·' + esc(m.name) + ' (小孩)</label>'; }).join('') + '</div><div class="subtotal-text">已选 <strong id="childSelectedCount_edit">' + (exp.childMemberIds ? exp.childMemberIds.length : 0) + '</strong> 人，小计：<strong id="childSubtotal_edit">¥' + ((exp.childPrice || 0) * (exp.childMemberIds ? exp.childMemberIds.length : 0)).toFixed(2) + '</strong></div></div>';
    h += '<div class="total-text">总计：<span id="splitTotal_edit">¥' + exp.amount.toFixed(2) + '</span></div><div style="background:#faf7f3;border-radius:16px;padding:10px;font-size:0.75rem;color:#7b6452;">💡 区分模式将按<strong>家庭</strong>自动均摊</div></div>';
    h += '<div class="input-group"><label>📅 时间</label><input class="input-field" type="datetime-local" id="editDateTime" value="' + new Date(exp.dateTime).toISOString().slice(0, 16) + '"></div>';
    h += '<div class="input-group"><label>👤 付款家庭</label><select class="input-field" id="editPayer">' + trip.families.map(function(f) { return '<option value="' + f.id + '"' + (f.id === exp.paidByFamilyId ? ' selected' : '') + '>' + esc(f.name) + '</option>'; }).join('') + '</select></div>';
    h += '<div class="action-row"><button class="btn btn-primary" style="flex:1;" onclick="saveExpenseEdit(\'' + exp.id + '\')">💾 保存</button><button class="btn btn-danger" style="flex:1;" onclick="deleteExpense(\'' + exp.id + '\')">🗑️ 删除</button></div></div></div>';
    area.innerHTML = h;
  }

  window.saveExpenseEdit = function(id) {
    var trip = getTrip(); if (!trip) return;
    var exp = trip.expenses.find(function(e) { return e.id === id; }); if (!exp) return;
    var expenseType = document.getElementById('expenseType_edit').value;
    exp.location = document.getElementById('editLocation').value.trim();
    exp.description = document.getElementById('editDesc').value.trim();
    exp.dateTime = new Date(document.getElementById('editDateTime').value).toISOString();
    exp.paidByFamilyId = document.getElementById('editPayer').value;
    var familyShares = {}, sharedFamilyIds = [], sharedMemberIds = [];
    if (expenseType === 'unified') {
      exp.expenseType = 'unified'; exp.adultPrice = 0; exp.childPrice = 0; exp.adultMemberIds = []; exp.childMemberIds = [];
      exp.amount = parseFloat(document.getElementById('editAmount').value) || 0;
      if (exp.amount <= 0) return alert('请输入有效金额');
      sharedMemberIds = Array.from(document.querySelectorAll('#personCheckboxList_edit input:checked')).map(function(c) { return c.value; });
      if (sharedMemberIds.length === 0) return alert('请选择均摊人员');
      trip.families.forEach(function(f) { familyShares[f.id] = 0; });
      var perPerson = exp.amount / sharedMemberIds.length;
      sharedMemberIds.forEach(function(mid) { var fid = mid.split('_')[1]; if (familyShares[fid] !== undefined) familyShares[fid] += perPerson; });
      sharedFamilyIds = Object.keys(familyShares).filter(function(fid) { return familyShares[fid] > 0; });
    } else {
      exp.expenseType = 'split'; exp.adultPrice = parseFloat(document.getElementById('adultPrice_edit').value) || 0; exp.childPrice = parseFloat(document.getElementById('childPrice_edit').value) || 0;
      exp.adultMemberIds = Array.from(document.querySelectorAll('#adultCheckboxList_edit input:checked')).map(function(cb) { return cb.value; });
      exp.childMemberIds = Array.from(document.querySelectorAll('#childCheckboxList_edit input:checked')).map(function(cb) { return cb.value; });
      exp.amount = exp.adultPrice * exp.adultMemberIds.length + exp.childPrice * exp.childMemberIds.length;
      if (exp.amount <= 0) return alert('请输入有效单价');
      familyShares = calculateFamilyShares(trip, exp.adultMemberIds, exp.childMemberIds, exp.adultPrice, exp.childPrice);
      sharedFamilyIds = Object.keys(familyShares).filter(function(fid) { return familyShares[fid] > 0; });
      trip.families.forEach(function(f) { if (familyShares[f.id] > 0) { f.members.forEach(function(m) { sharedMemberIds.push(m.id); }); } });
    }
    exp.familyShares = familyShares; exp.sharedFamilyIds = sharedFamilyIds; exp.sharedMemberIds = sharedMemberIds;
    save(); editingExpenseId = null; showDetailedExpenses(appData.activeTripId);
  };

  window.deleteExpense = function(id) { if (!confirm('确定删除？')) return; var trip = getTrip(); trip.expenses = trip.expenses.filter(function(e) { return e.id !== id; }); save(); editingExpenseId = null; showDetailedExpenses(appData.activeTripId); };

  // ==================== 设置 ====================
  function renderSettings() {
    var area = document.getElementById('contentArea');
    var h = '<div><h3>⚙️ 备份与恢复</h3>';
    h += '<div class="settings-card"><h3>📤 备份数据</h3><p>导出所有数据为文件</p><button class="btn btn-primary" onclick="backupData()">📥 导出备份</button></div>';
    h += '<div class="settings-card"><h3>📥 恢复数据</h3><p style="color:#c0392b;">⚠️ 将覆盖当前数据</p><input type="file" id="restoreFileInput" accept=".json" style="display:none;" onchange="restoreData(event)"><button class="btn btn-info" onclick="document.getElementById(\'restoreFileInput\').click()">📂 选择文件恢复</button></div>';
    h += '<div class="settings-card"><h3>🔄 重置数据</h3><p>恢复默认设置和预置行程</p><button class="btn btn-danger" onclick="resetData()">🗑️ 重置</button></div></div>';
    area.innerHTML = h;
  }

  window.backupData = function() { var data = JSON.stringify(appData, null, 2); var blob = new Blob([data], { type: 'application/json' }); var a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = '自驾乐游天下_备份_' + new Date().toISOString().slice(0,10) + '.json'; a.click(); alert('✅ 备份完成！'); };
  window.restoreData = function(e) { var file = e.target.files[0]; if (!file) return; var reader = new FileReader(); reader.onload = function(ev) { try { var data = JSON.parse(ev.target.result); if (!data.trips) throw new Error('格式错误'); if (!confirm('⚠️ 确定恢复？当前数据将被覆盖！')) { e.target.value = ''; return; } appData = data; save(); updateTripSelect(); setupDetailTripId = null; summaryDetailTripId = null; editingExpenseId = null; alert('✅ 恢复成功！'); render(); } catch(err) { alert('❌ 文件格式不正确'); } e.target.value = ''; }; reader.readAsText(file); };
  window.resetData = function() { if (!confirm('⚠️ 确定重置所有数据？')) return; if (!confirm('再次确认？')) return; initDefault(); save(); updateTripSelect(); setupDetailTripId = null; summaryDetailTripId = null; editingExpenseId = null; alert('✅ 已重置'); render(); };

  load(); updateTripSelect();
  document.getElementById('splashScreen').style.display = 'flex';
  document.getElementById('mainApp').style.display = 'none';
})();
</script>
